<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Biomarcadores da Doença de Alzheimer</title>
  <style>
    :root {
      --bg: #111827;
      --paper: #fbfbf8;
      --ink: #172033;
      --muted: #5f6b7a;
      --line: #d7dde6;
      --blue: #164e63;
      --teal: #0f766e;
      --amber: #92400e;
      --soft-blue: #e9f4f6;
      --soft-amber: #fff7ed;
      --soft-gray: #f4f6f8;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--ink);
      font-family: "Segoe UI", Arial, system-ui, sans-serif;
      display: grid;
      place-items: center;
      overflow: hidden;
    }

    .deck {
      width: min(96vw, 1420px);
      height: min(94vh, 860px);
      background: var(--paper);
      border-radius: 8px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, .45);
      position: relative;
      overflow: hidden;
    }

    .slide {
      display: none;
      height: 100%;
      padding: 22px 34px 54px;
    }

    .slide.active {
      display: grid;
      grid-template-rows: auto auto 1fr auto;
      gap: 9px;
    }

    .slide-topline {
      display: flex;
      justify-content: space-between;
      gap: 18px;
      align-items: center;
      color: var(--teal);
      font-weight: 700;
      text-transform: uppercase;
      font-size: .82rem;
      letter-spacing: .08em;
    }

    .slide-title {
      margin: 0;
      color: var(--blue);
      font-size: clamp(1.55rem, 2.15vw, 2.25rem);
      line-height: 1.05;
      border-bottom: 3px solid var(--teal);
      padding-bottom: 6px;
    }

    .categorization {
      background: var(--soft-blue);
      border-left: 5px solid var(--teal);
      padding: 9px 12px;
      border-radius: 6px;
      font-size: clamp(.82rem, .95vw, .98rem);
      line-height: 1.25;
    }

    .main-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr 1fr;
      gap: 8px;
      min-height: 0;
    }

    .field {
      background: white;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 10px 12px;
      min-height: 0;
      overflow: hidden;
    }

    .field h3 {
      margin: 0 0 4px;
      color: var(--blue);
      font-size: clamp(.92rem, 1.05vw, 1.08rem);
    }

    .field p {
      margin: 0;
      line-height: 1.24;
      font-size: clamp(.8rem, .98vw, 1rem);
    }

    .intro-slide.active {
      grid-template-rows: auto auto 1fr;
    }

    .intro-panel {
      display: grid;
      grid-template-columns: 1.1fr .9fr;
      gap: 22px;
      align-items: stretch;
      min-height: 0;
    }

    .intro-lead {
      background: white;
      border-left: 6px solid var(--teal);
      border-radius: 6px;
      padding: 24px 26px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 18px;
      box-shadow: 0 1px 0 rgba(15, 23, 42, .06);
    }

    .intro-lead p {
      margin: 0;
      font-size: clamp(1rem, 1.25vw, 1.22rem);
      line-height: 1.38;
    }

    .intro-highlight {
      background: var(--soft-blue);
      border-radius: 6px;
      padding: 20px 22px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 14px;
    }

    .intro-highlight h3 {
      margin: 0;
      color: var(--blue);
      font-size: clamp(1.05rem, 1.35vw, 1.28rem);
    }

    .intro-highlight p {
      margin: 0;
      color: var(--ink);
      font-size: clamp(.95rem, 1.08vw, 1.08rem);
      line-height: 1.34;
    }

    .intro-note {
      background: var(--soft-amber);
      border: 1px dashed #d97706;
      border-radius: 6px;
      padding: 14px 16px;
      color: #5f370e;
      font-size: clamp(.88rem, 1vw, 1rem);
      line-height: 1.3;
    }

    .formula-text {
      font-family: Consolas, "Courier New", monospace;
      color: #991b1b;
      font-weight: 700;
      background: var(--soft-gray);
      border-left: 4px solid var(--blue);
      padding: 6px 8px;
      border-radius: 5px;
      display: block;
      margin-top: 3px;
    }

    .notes {
      background: var(--soft-amber);
      border: 1px dashed #d97706;
      border-radius: 6px;
      padding: 9px 11px;
      display: grid;
      grid-template-columns: 1.25fr 1fr;
      gap: 12px;
      color: #5f370e;
      min-height: 108px;
    }

    .notes h3 {
      margin: 0 0 4px;
      font-size: .83rem;
      text-transform: uppercase;
      color: var(--amber);
      letter-spacing: .05em;
    }

    .notes p {
      margin: 0;
      font-size: clamp(.72rem, .86vw, .9rem);
      line-height: 1.22;
    }

    .controls {
      position: absolute;
      right: 28px;
      bottom: 14px;
      display: flex;
      gap: 12px;
      align-items: center;
      background: rgba(251, 251, 248, .92);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 5px 8px;
    }

    .counter {
      font-weight: 700;
      color: var(--muted);
      min-width: 74px;
      text-align: center;
    }

    button {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      border: 0;
      background: var(--teal);
      color: white;
      font-size: 1.15rem;
      cursor: pointer;
    }

    button:disabled {
      background: #9ca3af;
      cursor: not-allowed;
    }

    .progress {
      position: absolute;
      left: 0;
      bottom: 0;
      width: 100%;
      height: 5px;
      background: #e5e7eb;
    }

    .progress > div {
      height: 100%;
      width: 0;
      background: var(--teal);
      transition: width .2s ease;
    }

    @media (max-width: 900px) {
      .deck { width: 100vw; height: 100vh; border-radius: 0; }
      .slide { padding: 18px 16px 58px; }
      .main-grid { grid-template-columns: 1fr; grid-template-rows: repeat(4, auto); }
      .notes { grid-template-columns: 1fr; min-height: auto; }
    }
  </style>
</head>
<body>
  <main class="deck" aria-label="Apresentação de biomarcadores da Doença de Alzheimer">
    <section id="slides"></section>
    <nav class="controls" aria-label="Controles da apresentação">
      <span class="counter"><span id="current">1</span> / <span id="total">1</span></span>
      <button id="prev" aria-label="Slide anterior">&#8592;</button>
      <button id="next" aria-label="Próximo slide">&#8594;</button>
    </nav>
    <div class="progress"><div id="progress"></div></div>
  </main>

  <script>

      s18: {

      s19: {

    function esc(text) {
      return String(text).replace(/[&<>"']/g, ch => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", "\"": "&quot;", "'": "&#039;" }[ch]));
    }

    function renderSlide(item, index) {
      const [title, group, atn, profileName, formula, legend, detail] = item;
      const profile = profiles[profileName];
      if (index < 3) {
        return `
        <article class="slide intro-slide${index === 0 ? " active" : ""}" id="slide-${index + 1}">
          <div class="slide-topline"><span>Slide ${index + 1}</span><span>${esc(group)}</span></div>
          <h1 class="slide-title">${esc(title)}</h1>
          <div class="categorization"><strong>Categorização:</strong> ${esc(group)} | <strong>Classificação:</strong> ${esc(atn)}</div>
          <div class="intro-panel">
            <section class="intro-lead">
              <p>${esc(profile.phys)}</p>
              <p>${esc(profile.technique)}</p>
              <div class="intro-note"><strong>Notas do Orador:</strong> ${esc(profile.notes)}</div>
            </section>
            <aside class="intro-highlight">
              <h3>Ideia central</h3>
              <p>${esc(profile.interpretation)}</p>
              <h3>Métrica-chave</h3>
              <p><span class="formula-text">${esc(formula)}</span></p>
              <p><strong>Legenda da Fórmula:</strong> ${esc(legend)}</p>
            </aside>
          </div>
        </article>`;
      }
      return `
        <article class="slide${index === 0 ? " active" : ""}" id="slide-${index + 1}">
          <div class="slide-topline"><span>Slide ${index + 1}</span><span>${esc(group)}</span></div>
          <h1 class="slide-title">${esc(title)}</h1>
          <div class="categorization"><strong>Categorização:</strong> ${esc(group)} | <strong>Classificação:</strong> ${esc(atn)}</div>
          <div class="main-grid">
            <div class="field"><h3>Fisiopatologia</h3><p>${esc(profile.phys)} ${esc(detail)}</p></div>
            <div class="field"><h3>Exame/Técnica</h3><p>${esc(profile.technique)}</p></div>
            <div class="field"><h3>Métrica/Fórmula</h3><p><span class="formula-text">${esc(formula)}</span></p></div>
            <div class="field"><h3>Interpretação</h3><p>${esc(profile.interpretation)} ${esc(detail)}</p></div>
          </div>
          <div class="notes">
            <div><h3>Notas do Orador</h3><p>${esc(profile.notes)} ${esc(detail)}</p></div>
            <div><h3>Legenda da Fórmula</h3><p>${esc(legend)}</p></div>
          </div>
        </article>`;
    }

    const root = document.getElementById("slides");
    root.innerHTML = slides.map(renderSlide).join("");

    const slideEls = Array.from(document.querySelectorAll(".slide"));
    let current = 0;
    document.getElementById("total").textContent = slideEls.length;

    function update() {
      slideEls.forEach((slide, index) => slide.classList.toggle("active", index === current));
      document.getElementById("current").textContent = current + 1;
      document.getElementById("prev").disabled = current === 0;
      document.getElementById("next").disabled = current === slideEls.length - 1;
      document.getElementById("progress").style.width = `${slideEls.length <= 1 ? 100 : (current / (slideEls.length - 1)) * 100}%`;
    }

    function go(delta) {
      current = Math.max(0, Math.min(slideEls.length - 1, current + delta));
      update();
    }

    document.getElementById("prev").addEventListener("click", () => go(-1));
    document.getElementById("next").addEventListener("click", () => go(1));
    document.addEventListener("keydown", event => {
      if (event.key === "ArrowRight" || event.key === " ") go(1);
      if (event.key === "ArrowLeft") go(-1);
    });
    update();
  </script>
